
services:
  api:
    build: .
    container_name: fiscaliza-api
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

  redis:
    image: redis:7.4
    container_name: fiscaliza-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data: